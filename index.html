<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サークルイベント一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .card { transition: transform 0.1s; }
      .card:active { transform: scale(0.98); }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;  
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
      <h1 class="text-xl font-bold text-center">サークルイベント一覧</h1>
    </header>

    <div class="p-4 sticky top-[60px] bg-gray-100 z-10 border-b border-gray-200">
      <div class="relative max-w-md mx-auto">
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="イベントを検索..." 
          class="w-full p-3 pl-10 rounded-full border shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
        <span class="absolute left-3 top-3 text-gray-400">🔍</span>
      </div>
    </div>

    <main id="app" class="p-4 max-w-md mx-auto pb-20">
      <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 rounded-full border-t-transparent"></div>
        <p class="mt-2 text-gray-500 text-sm">読み込み中...</p>
      </div>

      <div id="event-list" class="space-y-4"></div>

      <div id="pagination" class="hidden justify-center items-center space-x-4 mt-8 mb-4">
        <button id="prev-btn" onclick="changePage(-1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 disabled:cursor-not-allowed text-sm font-bold">前へ</button>
        <span id="page-info" class="text-sm font-bold text-gray-600">1 / 1</span>
        <button id="next-btn" onclick="changePage(1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 disabled:cursor-not-allowed text-sm font-bold">次へ</button>
      </div>
    </main>

    <button onclick="openCreateModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-3xl hover:bg-blue-700 transition-colors z-30">
      ＋
    </button>

    <div id="event-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[95vh] overflow-y-auto p-5">
        <h2 id="modal-title" class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">新規イベントを投稿</h2>
        
        <input type="hidden" id="edit-row-number">
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">日付 <span class="text-red-500">*</span></label>
            <input type="date" id="input-date" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">イベント名 <span class="text-red-500">*</span></label>
            <input type="text" id="input-title" placeholder="例: 4月定期山行" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">場所</label>
            <input type="text" id="input-location" placeholder="例: 高尾山" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div id="author-field">
            <label class="block text-sm font-bold text-gray-700 mb-1">投稿者名 <span class="text-red-500">*</span></label>
            <input type="text" id="input-author" placeholder="あなたの名前" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">詳細</label>
            <textarea id="input-desc" rows="15" placeholder="イベントの詳細を入力してください" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
          </div>
        </div>

        <div class="flex justify-end space-x-3 mt-6 pb-2">
          <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded hover:bg-gray-300">キャンセル</button>
          <button id="submit-btn" onclick="handleFormSubmit()" class="px-4 py-2 bg-blue-600 text-white font-bold rounded shadow hover:bg-blue-700 transition-colors">保存して送信</button>
        </div>
      </div>
    </div>

    <script>
      let currentPage = 1;
      let currentSearch = '';
      let searchTimer = null;
      let cachedEvents = [];

      window.onload = function() { loadData(); };

      function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          currentSearch = document.getElementById('search-input').value;
          currentPage = 1;
          loadData();
        }, 500);
      }

      function changePage(diff) {
        currentPage += diff;
        loadData();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function loadData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('event-list').innerHTML = '';
        document.getElementById('pagination').classList.add('hidden');
        google.script.run.withSuccessHandler(renderEvents).withFailureHandler(handleError).getEvents(currentSearch, currentPage);
      }

      function renderEvents(data) {
        const list = document.getElementById('event-list');
        document.getElementById('loading').style.display = 'none';
        const pagination = document.getElementById('pagination');
        cachedEvents = data.events;

        if (!data || !data.events || data.events.length === 0) {
          list.innerHTML = '<div class="text-center py-10 text-gray-500 bg-white rounded shadow">該当するイベントが見つかりませんでした</div>';
          return;
        }

        data.events.forEach((event, index) => {
          const isCompleted = (event.status === '完了');
          const cardBorder = isCompleted ? 'border-green-500' : 'border-blue-500';
          const badgeHtml = isCompleted 
            ? `<span class="text-xs bg-green-100 text-green-700 font-bold px-2 py-1 rounded border border-green-200">✅ 完了</span>`
            : `<span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded border border-blue-200">🗓 予定</span>`;

          const card = document.createElement('div');
          card.className = `card bg-white rounded-lg shadow p-4 border-l-4 ${cardBorder}`;
          card.innerHTML = `
            <div class="flex justify-between items-start mb-1">
              <span class="text-sm font-bold text-gray-600">${event.date}</span>
              <div class="flex items-center space-x-2">
                <button onclick="openEditModal(${index})" class="text-xs text-blue-500 font-bold hover:underline">編集</button>
                <button id="author-${index}" onclick="toggleAuthor(${index})" class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600 truncate max-w-[100px] text-left transition-all">${event.author}</button>
              </div>
            </div>
            <div class="flex justify-between items-start mb-2 gap-2">
              <h2 class="text-lg font-bold text-gray-800 leading-tight">${event.title}</h2>
              <div class="shrink-0 mt-0.5">${badgeHtml}</div>
            </div>
            <p class="text-sm text-gray-600 mb-3 font-medium flex items-center"><span class="mr-1">📍</span> ${event.location}</p>
            <div id="desc-${index}" class="text-sm text-gray-700 whitespace-pre-wrap line-clamp-3">${event.description}</div>
            <button id="btn-${index}" onclick="toggleText(${index})" class="mt-2 text-blue-600 text-sm font-bold flex items-center">
              <span>続きを読む</span>
              <svg id="icon-${index}" class="w-4 h-4 ml-1 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <hr class="my-3 border-gray-200">
            ${isCompleted ? `
              <div class="bg-gray-50 p-3 rounded text-sm text-gray-700 border border-gray-200">
                <p class="font-bold text-green-700 mb-1 flex items-center">🎉 完了報告</p>
                <p class="whitespace-pre-wrap">${event.report}</p>
              </div>
            ` : `
              <div id="report-area-${index}" class="hidden mt-3">
                <textarea id="report-text-${index}" class="w-full border rounded p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" rows="3" placeholder="無事に終わりました！などのコメントを入力..."></textarea>
                <div class="flex justify-end mt-2 space-x-2">
                  <button onclick="hideReportForm(${index})" class="px-3 py-1 text-sm text-gray-600 border rounded bg-white hover:bg-gray-50">キャンセル</button>
                  <button onclick="submitReport(${index}, ${event.rowNumber})" class="px-3 py-1 text-sm bg-green-500 hover:bg-green-600 text-white font-bold rounded shadow transition-colors">報告を送信</button>
                </div>
              </div>
              <button id="show-report-btn-${index}" onclick="showReportForm(${index})" class="w-full py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold text-sm rounded transition-colors border border-gray-200">
                📝 イベント完了を報告する
              </button>
            `}
          `;
          list.appendChild(card);
          
          setTimeout(() => {
            const el = document.getElementById(`desc-${index}`);
            if (el.scrollHeight <= el.clientHeight) document.getElementById(`btn-${index}`).style.display = 'none';
          }, 10);
        });

        document.getElementById('page-info').innerText = `${data.currentPage} / ${data.totalPages || 1}`;
        document.getElementById('prev-btn').disabled = (data.currentPage <= 1);
        document.getElementById('next-btn').disabled = (data.currentPage >= data.totalPages);
        if (data.totalCount > 0) {
          pagination.classList.remove('hidden');
          pagination.classList.add('flex');
        }
      }

      function openCreateModal() {
        document.getElementById('modal-title').innerText = "新規イベントを投稿";
        document.getElementById('edit-row-number').value = "";
        document.getElementById('author-field').classList.remove('hidden');
        document.getElementById('event-modal').classList.remove('hidden');
        document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
      }

      function openEditModal(index) {
        const event = cachedEvents[index];
        document.getElementById('modal-title').innerText = "イベントを編集";
        document.getElementById('edit-row-number').value = event.rowNumber;
        document.getElementById('author-field').classList.add('hidden');
        
        const d = new Date(event.date);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        document.getElementById('input-date').value = `${yyyy}-${mm}-${dd}`;
        
        document.getElementById('input-title').value = event.title;
        document.getElementById('input-location').value = event.location;
        document.getElementById('input-desc').value = event.description;
        document.getElementById('event-modal').classList.remove('hidden');
      }

      function closeModal() {
        document.getElementById('event-modal').classList.add('hidden');
        document.getElementById('input-title').value = '';
        document.getElementById('input-location').value = '';
        document.getElementById('input-author').value = '';
        document.getElementById('input-desc').value = '';
      }

      function handleFormSubmit() {
        const rowNumber = document.getElementById('edit-row-number').value;
        const date = document.getElementById('input-date').value.replace(/-/g, '/');
        const title = document.getElementById('input-title').value;
        const location = document.getElementById('input-location').value;
        const description = document.getElementById('input-desc').value;

        if (!date || !title) { alert('必須項目を入力してください'); return; }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = '保存中...';

        if (rowNumber) {
          google.script.run
            .withSuccessHandler(() => { alert('更新しました！'); closeModal(); loadData(); btn.disabled = false; btn.innerText = '保存して送信'; })
            .updateEvent(rowNumber, { date, title, location, description });
        } else {
          const author = document.getElementById('input-author').value;
          if (!author) { alert('投稿者名を入力してください'); btn.disabled = false; btn.innerText = '保存して送信'; return; }
          google.script.run
            .withSuccessHandler(() => { alert('投稿しました！'); closeModal(); loadData(); btn.disabled = false; btn.innerText = '保存して送信'; })
            .createEventAndSendEmail({ date, title, location, author, description });
        }
      }

      function toggleAuthor(index) {
        const el = document.getElementById(`author-${index}`);
        if (el.classList.contains('truncate')) { el.classList.remove('truncate', 'max-w-[100px]'); el.classList.add('break-all'); }
        else { el.classList.add('truncate', 'max-w-[100px]'); el.classList.remove('break-all'); }
      }
      function toggleText(index) {
        const desc = document.getElementById(`desc-${index}`);
        const btnSpan = document.getElementById(`btn-${index}`).querySelector('span');
        const icon = document.getElementById(`icon-${index}`);
        if (desc.classList.contains('line-clamp-3')) { desc.classList.remove('line-clamp-3'); btnSpan.innerText = '閉じる'; icon.style.transform = 'rotate(180deg)'; }
        else { desc.classList.add('line-clamp-3'); btnSpan.innerText = '続きを読む'; icon.style.transform = 'rotate(0deg)'; }
      }
      function showReportForm(index) { document.getElementById(`report-area-${index}`).classList.remove('hidden'); document.getElementById(`show-report-btn-${index}`).classList.add('hidden'); }
      function hideReportForm(index) { document.getElementById(`report-area-${index}`).classList.add('hidden'); document.getElementById(`show-report-btn-${index}`).classList.remove('hidden'); }
      function submitReport(index, rowNumber) {
        const comment = document.getElementById(`report-text-${index}`).value;
        if(!comment.trim()) { alert('コメントを入力してください'); return; }
        google.script.run.withSuccessHandler(() => { alert('報告しました！'); loadData(); }).submitCompletion(rowNumber, comment);
      }
      function handleError(error) { document.getElementById('loading').innerHTML = `<p class="text-red-500">通信エラー: ${error.message}</p>`; }
    </script>
  </body>
</html>
