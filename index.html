<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サークルイベント一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .card { transition: transform 0.1s; }
      .card:active { transform: scale(0.98); }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;  
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
      <h1 class="text-xl font-bold text-center">サークルイベント一覧</h1>
    </header>

    <div class="p-4 sticky top-[60px] bg-gray-100 z-10 border-b border-gray-200">
      <div class="relative max-w-md mx-auto">
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="イベントを検索..." 
          class="w-full p-3 pl-10 rounded-full border shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
        <span class="absolute left-3 top-3 text-gray-400">🔍</span>
      </div>
    </div>

    <main id="app" class="p-4 max-w-md mx-auto pb-10">
      <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 rounded-full border-t-transparent"></div>
        <p class="mt-2 text-gray-500 text-sm">読み込み中...</p>
      </div>

      <div id="event-list" class="space-y-4"></div>

      <div id="pagination" class="hidden justify-center items-center space-x-4 mt-8 mb-4">
        <button id="prev-btn" onclick="changePage(-1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 disabled:cursor-not-allowed text-sm font-bold">前へ</button>
        <span id="page-info" class="text-sm font-bold text-gray-600">1 / 1</span>
        <button id="next-btn" onclick="changePage(1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 disabled:cursor-not-allowed text-sm font-bold">次へ</button>
      </div>
    </main>

    <script>
      let currentPage = 1;
      let currentSearch = '';
      let searchTimer = null;

      window.onload = function() {
        loadData();
      };

      function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          currentSearch = document.getElementById('search-input').value;
          currentPage = 1;
          loadData();
        }, 500);
      }

      function changePage(diff) {
        currentPage += diff;
        loadData();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function loadData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('event-list').innerHTML = '';
        document.getElementById('pagination').classList.add('hidden');
        
        google.script.run
          .withSuccessHandler(renderEvents)
          .withFailureHandler(handleError)
          .getEvents(currentSearch, currentPage);
      }

      function renderEvents(data) {
        const list = document.getElementById('event-list');
        const loading = document.getElementById('loading');
        const pagination = document.getElementById('pagination');
        
        loading.style.display = 'none';

        if (!data || !data.events || data.events.length === 0) {
          list.innerHTML = '<div class="text-center py-10 text-gray-500 bg-white rounded shadow">該当するイベントが見つかりませんでした</div>';
          return;
        }

        data.events.forEach((event, index) => {
          const isCompleted = (event.status === '完了');
          const cardBorder = isCompleted ? 'border-green-500' : 'border-blue-500';
          const badgeHtml = isCompleted 
            ? `<span class="text-xs bg-green-100 text-green-700 font-bold px-2 py-1 rounded border border-green-200">✅ 完了</span>`
            : `<span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded border border-blue-200">🗓 予定</span>`;

          const card = document.createElement('div');
          card.className = `card bg-white rounded-lg shadow p-4 border-l-4 ${cardBorder}`;
          
          card.innerHTML = `
            <div class="flex justify-between items-start mb-1">
              <span class="text-sm font-bold text-gray-600">${event.date}</span>
              <button id="author-${index}" onclick="toggleAuthor(${index})" class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600 truncate max-w-[140px] text-left transition-all">
                ${event.author}
              </button>
            </div>
            
            <div class="flex justify-between items-start mb-2 gap-2">
              <h2 class="text-lg font-bold text-gray-800 leading-tight">${event.title}</h2>
              <div class="shrink-0 mt-0.5">
                ${badgeHtml}
              </div>
            </div>
            
            <p class="text-sm text-gray-600 mb-3 font-medium flex items-center">
              <span class="mr-1">📍</span> ${event.location}
            </p>
            
            <div id="desc-${index}" class="text-sm text-gray-700 whitespace-pre-wrap line-clamp-3">${event.description}</div>
            
            <button id="btn-${index}" onclick="toggleText(${index})" class="mt-2 text-blue-600 text-sm font-bold flex items-center">
              <span>続きを読む</span>
              <svg id="icon-${index}" class="w-4 h-4 ml-1 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </button>

            <hr class="my-3 border-gray-200">
            
            ${isCompleted ? `
              <div class="bg-gray-50 p-3 rounded text-sm text-gray-700 border border-gray-200">
                <p class="font-bold text-green-700 mb-1 flex items-center">🎉 完了報告</p>
                <p class="whitespace-pre-wrap">${event.report}</p>
              </div>
            ` : `
              <div id="report-area-${index}" class="hidden mt-3">
                <textarea id="report-text-${index}" class="w-full border rounded p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" rows="2" placeholder="無事に終わりました！などのコメントを入力..."></textarea>
                <div class="flex justify-end mt-2 space-x-2">
                  <button onclick="hideReportForm(${index})" class="px-3 py-1 text-sm text-gray-600 border rounded bg-white hover:bg-gray-50">キャンセル</button>
                  <button onclick="submitReport(${index}, ${event.rowNumber})" class="px-3 py-1 text-sm bg-green-500 hover:bg-green-600 text-white font-bold rounded shadow transition-colors">報告を送信</button>
                </div>
              </div>
              <button id="show-report-btn-${index}" onclick="showReportForm(${index})" class="w-full py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold text-sm rounded transition-colors border border-gray-200">
                📝 イベント完了を報告する
              </button>
            `}
          `;
          list.appendChild(card);
          
          setTimeout(() => {
            const el = document.getElementById(`desc-${index}`);
            if (el.scrollHeight <= el.clientHeight) document.getElementById(`btn-${index}`).style.display = 'none';
          }, 10);
        });

        document.getElementById('page-info').innerText = `${data.currentPage} / ${data.totalPages || 1}`;
        document.getElementById('prev-btn').disabled = (data.currentPage <= 1);
        document.getElementById('next-btn').disabled = (data.currentPage >= data.totalPages);
        
        if (data.totalCount > 0) {
          pagination.classList.remove('hidden');
          pagination.classList.add('flex');
        }
      }

      // 投稿者の省略/全文表示の切り替え
      function toggleAuthor(index) {
        const authorEl = document.getElementById(`author-${index}`);
        if (authorEl.classList.contains('truncate')) {
          // 省略されている場合 -> 全文表示
          authorEl.classList.remove('truncate', 'max-w-[140px]');
          authorEl.classList.add('break-all'); // 長いメールアドレス等も折り返す
        } else {
          // 全文表示されている場合 -> 省略表示に戻す
          authorEl.classList.add('truncate', 'max-w-[140px]');
          authorEl.classList.remove('break-all');
        }
      }

      function toggleText(index) {
        const desc = document.getElementById(`desc-${index}`);
        const btnSpan = document.getElementById(`btn-${index}`).querySelector('span');
        const icon = document.getElementById(`icon-${index}`);

        if (desc.classList.contains('line-clamp-3')) {
          desc.classList.remove('line-clamp-3');
          btnSpan.innerText = '閉じる';
          if(icon) icon.style.transform = 'rotate(180deg)';
        } else {
          desc.classList.add('line-clamp-3');
          btnSpan.innerText = '続きを読む';
          if(icon) icon.style.transform = 'rotate(0deg)';
        }
      }

      function showReportForm(index) {
        document.getElementById(`report-area-${index}`).classList.remove('hidden');
        document.getElementById(`show-report-btn-${index}`).classList.add('hidden');
      }

      function hideReportForm(index) {
        document.getElementById(`report-area-${index}`).classList.add('hidden');
        document.getElementById(`show-report-btn-${index}`).classList.remove('hidden');
        document.getElementById(`report-text-${index}`).value = ''; 
      }

      function submitReport(index, rowNumber) {
        const comment = document.getElementById(`report-text-${index}`).value;
        if(!comment.trim()) {
          alert('コメントを入力してください。');
          return;
        }
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = '送信中...';
        btn.classList.add('opacity-50', 'cursor-not-allowed');

        google.script.run
          .withSuccessHandler(function() {
            alert('完了報告を送信しました！');
            loadData();
          })
          .withFailureHandler(function(error) {
            alert('エラーが発生しました: ' + error.message);
            btn.disabled = false;
            btn.innerText = originalText;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
          })
          .submitCompletion(rowNumber, comment);
      }

      function handleError(error) {
        document.getElementById('loading').innerHTML = `<p class="text-red-500 bg-red-50 p-3 rounded shadow text-sm">通信エラーが発生しました。<br>${error.message}</p>`;
      }
    </script>
  </body>
</html>
