<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サークルイベントポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .card { transition: transform 0.1s; }
      .card:active { transform: scale(0.98); }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;  
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
      <h1 class="text-xl font-bold text-center">サークルイベント一覧</h1>
    </header>

    <div class="p-4 sticky top-[60px] bg-gray-100 z-10 border-b border-gray-200">
      <div class="relative max-w-md mx-auto">
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="イベント名、場所、日付で検索..." 
          class="w-full p-3 pl-10 rounded-full border shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
        <span class="absolute left-3 top-3 text-gray-400">🔍</span>
      </div>
    </div>

    <main id="app" class="p-4 max-w-md mx-auto pb-24">
      <div id="loading" class="text-center py-20 hidden">
        <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 rounded-full border-t-transparent"></div>
        <p class="mt-2 text-gray-500 text-xs">通信中...</p>
      </div>

      <div id="event-list" class="space-y-4"></div>

      <div id="pagination" class="hidden justify-center items-center space-x-4 mt-8 mb-4">
        <button id="prev-btn" onclick="changePage(-1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 text-sm font-bold">前へ</button>
        <span id="page-info" class="text-sm font-bold text-gray-600">1 / 1</span>
        <button id="next-btn" onclick="changePage(1)" class="px-4 py-2 bg-white text-gray-700 border rounded shadow disabled:opacity-30 text-sm font-bold">次へ</button>
      </div>
    </main>

    <button onclick="openCreateModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-3xl hover:bg-blue-700 transition-colors z-30">
      ＋
    </button>

    <div id="event-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[95vh] overflow-y-auto p-5">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
          <h2 id="modal-title" class="text-xl font-bold text-gray-800">新規イベント</h2>
          <button id="delete-btn" onclick="handleDelete()" class="hidden text-red-500 text-sm font-bold border border-red-200 px-2 py-1 rounded hover:bg-red-50">削除</button>
        </div>
        
        <input type="hidden" id="edit-row-number">
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">日付 *</label>
            <input type="date" id="input-date" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">イベント名 *</label>
            <input type="text" id="input-title" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">場所</label>
            <input type="text" id="input-location" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">投稿者名 *</label>
            <input type="text" id="input-author" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">詳細</label>
            <textarea id="input-desc" rows="10" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="内容を入力..."></textarea>
          </div>
        </div>

        <div class="flex justify-end space-x-3 mt-6 pb-2">
          <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded">キャンセル</button>
          <button id="submit-btn" onclick="handleFormSubmit()" class="px-4 py-2 bg-blue-600 text-white font-bold rounded shadow">保存して送信</button>
        </div>
      </div>
    </div>

    <script>
      let currentPage = 1;
      let currentSearch = '';
      let searchTimer = null;
      let cachedEvents = [];

      window.onload = loadData;

      function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          currentSearch = document.getElementById('search-input').value;
          currentPage = 1;
          loadData();
        }, 400);
      }

      function changePage(diff) {
        currentPage += diff;
        loadData();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function loadData() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('event-list').innerHTML = '';
        google.script.run
          .withSuccessHandler(renderEvents)
          .withFailureHandler(handleError)
          .getEvents(currentSearch, currentPage);
      }

      function renderEvents(data) {
        const list = document.getElementById('event-list');
        const loading = document.getElementById('loading');
        const pagination = document.getElementById('pagination');
        
        loading.classList.add('hidden');
        list.innerHTML = ''; 
        cachedEvents = data.events;

        if (!data || !data.events || data.events.length === 0) {
          list.innerHTML = '<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500 font-bold">該当するイベントが見つかりませんでした</div>';
          pagination.classList.add('hidden');
          return;
        }

        data.events.forEach((event, index) => {
          const isCompleted = (event.status === '完了');
          const card = document.createElement('div');
          card.className = `card bg-white rounded-lg shadow p-4 border-l-4 ${isCompleted ? 'border-green-500' : 'border-blue-500'}`;
          
          card.innerHTML = `
            <div class="flex justify-between items-start mb-1">
              <span class="text-sm font-bold text-gray-600">${event.date}</span>
              <div class="flex items-center gap-2">
                <button onclick="openEditModal(${index})" class="text-xs text-blue-500 font-bold underline">編集</button>
                <button id="author-${index}" onclick="toggleAuthor(${index})" class="text-xs bg-gray-200 px-2 py-0.5 rounded text-gray-600 truncate max-w-[120px] text-left transition-all">${event.author}</button>
              </div>
            </div>
            <div class="flex justify-between items-start mb-2 gap-2">
              <h2 class="text-lg font-bold text-gray-800 leading-tight">${event.title}</h2>
              <span class="shrink-0 text-xs font-bold px-2 py-1 rounded border ${isCompleted ? 'bg-green-100 text-green-700 border-green-200' : 'bg-blue-100 text-blue-700 border-blue-200'}">${isCompleted ? '✅ 完了' : '🗓 予定'}</span>
            </div>
            <p class="text-sm text-gray-600 mb-2 font-medium">📍 ${event.location}</p>
            <div id="desc-${index}" class="text-sm text-gray-700 whitespace-pre-wrap line-clamp-3">${event.description}</div>
            <button id="btn-${index}" onclick="toggleText(${index})" class="mt-2 text-blue-600 text-sm font-bold">続きを読む</button>
            <hr class="my-3 border-gray-100">
            ${isCompleted ? `
              <div class="bg-gray-50 p-3 rounded text-sm text-gray-700 border border-gray-200">
                <p class="font-bold text-green-700 mb-1">🎉 完了報告</p>
                <p class="whitespace-pre-wrap">${event.report}</p>
              </div>
            ` : `
              <div id="report-area-${index}" class="hidden mt-3">
                <textarea id="report-text-${index}" class="w-full border rounded p-2 text-sm outline-none focus:ring-2 focus:ring-blue-400" rows="3" placeholder="完了コメントを入力..."></textarea>
                <div class="flex justify-end mt-2 space-x-2">
                  <button onclick="hideReportForm(${index})" class="px-3 py-1 text-sm text-gray-600 border rounded bg-white">キャンセル</button>
                  <button onclick="submitReport(${index}, ${event.rowNumber})" class="px-3 py-1 text-sm bg-green-500 text-white font-bold rounded">送信</button>
                </div>
              </div>
              <button id="show-report-btn-${index}" onclick="showReportForm(${index})" class="w-full py-2 bg-gray-50 border rounded text-sm font-bold text-gray-700">📝 イベント完了を報告する</button>
            `}
          `;
          list.appendChild(card);
          
          setTimeout(() => {
            const el = document.getElementById(`desc-${index}`);
            if (el && el.scrollHeight <= el.clientHeight) document.getElementById(`btn-${index}`).style.display = 'none';
          }, 50);
        });

        pagination.classList.remove('hidden');
        pagination.classList.add('flex');
        document.getElementById('page-info').innerText = `${data.currentPage} / ${data.totalPages}`;
        document.getElementById('prev-btn').disabled = (data.currentPage <= 1);
        document.getElementById('next-btn').disabled = (data.currentPage >= data.totalPages);
      }

      // モーダル操作
      function openCreateModal() {
        document.getElementById('modal-title').innerText = "新規イベントを投稿";
        const delBtn = document.getElementById('delete-btn');
        delBtn.classList.add('hidden');
        delBtn.disabled = false;
        delBtn.innerText = "削除";
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').innerText = "保存して送信";
        document.getElementById('edit-row-number').value = "";
        document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('event-modal').classList.remove('hidden');
      }

      function openEditModal(index) {
        const event = cachedEvents[index];
        document.getElementById('modal-title').innerText = "イベントを編集";
        const delBtn = document.getElementById('delete-btn');
        delBtn.classList.remove('hidden');
        delBtn.disabled = false;
        delBtn.innerText = "削除";
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').innerText = "保存して送信";
        document.getElementById('edit-row-number').value = event.rowNumber;
        
        const d = new Date(event.date);
        document.getElementById('input-date').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        document.getElementById('input-title').value = event.title;
        document.getElementById('input-location').value = event.location;
        document.getElementById('input-author').value = event.author;
        document.getElementById('input-desc').value = event.description;
        document.getElementById('event-modal').classList.remove('hidden');
      }

      function closeModal() {
        document.getElementById('event-modal').classList.add('hidden');
        document.getElementById('input-title').value = '';
        document.getElementById('input-location').value = '';
        document.getElementById('input-author').value = '';
        document.getElementById('input-desc').value = '';
      }

      function handleFormSubmit() {
        const row = document.getElementById('edit-row-number').value;
        const eventData = {
          date: document.getElementById('input-date').value.replace(/-/g, '/'),
          title: document.getElementById('input-title').value,
          location: document.getElementById('input-location').value,
          author: document.getElementById('input-author').value,
          description: document.getElementById('input-desc').value
        };
        if (!eventData.date || !eventData.title || !eventData.author) { alert('必須項目を埋めてください'); return; }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = '送信中...';

        if (row) {
          google.script.run.withSuccessHandler(() => { alert('更新完了！'); loadData(); closeModal(); }).updateEvent(row, eventData);
        } else {
          google.script.run.withSuccessHandler(() => { alert('投稿完了！'); loadData(); closeModal(); }).createEventAndSendEmail(eventData);
        }
      }

      function handleDelete() {
        const row = document.getElementById('edit-row-number').value;
        if (confirm("本当に削除しますか？")) {
          const btn = document.getElementById('delete-btn');
          btn.disabled = true; btn.innerText = "削除中...";
          google.script.run.withSuccessHandler(() => { alert('削除しました'); loadData(); closeModal(); }).deleteEvent(row);
        }
      }

      // その他UI
      function toggleAuthor(index) {
        const el = document.getElementById(`author-${index}`);
        if (el.classList.contains('truncate')) { el.classList.remove('truncate', 'max-w-[120px]'); el.classList.add('break-all'); }
        else { el.classList.add('truncate', 'max-w-[120px]'); el.classList.remove('break-all'); }
      }
      function toggleText(index) {
        const desc = document.getElementById(`desc-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        if (desc.classList.contains('line-clamp-3')) { desc.classList.remove('line-clamp-3'); btn.innerText = '閉じる'; }
        else { desc.classList.add('line-clamp-3'); btn.innerText = '続きを読む'; }
      }
      function showReportForm(index) { document.getElementById(`report-area-${index}`).classList.remove('hidden'); }
      function hideReportForm(index) { document.getElementById(`report-area-${index}`).classList.add('hidden'); }
      function submitReport(index, row) {
        const comment = document.getElementById(`report-text-${index}`).value;
        if(!comment.trim()) return;
        google.script.run.withSuccessHandler(() => { alert('報告しました！'); loadData(); }).submitCompletion(row, comment);
      }
      function handleError(e) { alert("エラー: " + e.message); document.getElementById('loading').classList.add('hidden'); }
    </script>
  </body>
</html>
